name: Handbook / Docs Task
description: Задача по документации TMKI Engineering Handbook
title: "[docs] "
labels: ["docs"]
body:
  - type: dropdown
    id: phase
    attributes:
      label: Фаза
      options:
        - phase-0
        - phase-1
        - phase-2
        - phase-3
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Цель
      description: Что должно измениться в хэндбуке
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Затронутые файлы
      placeholder: "10_ai_runtime.md, README.md"
  - type: textarea
    id: criteria
    attributes:
      label: Критерий готовности
    validations:
      required: true

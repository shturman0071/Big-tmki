name: CI хэндбука

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Проверка Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Запуск markdownlint-cli2
        uses: davidanson/markdownlint-cli2-action@v19
        with:
          config: .markdownlint.jsonc
          globs: |
            **/*.md
            !**/node_modules/**

  secret-scan:
    name: Сканирование секретов (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Запуск gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  runtime-tests:
    name: Тесты Python runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Установка зависимостей
        run: python -m pip install -e "./runtime[dev]"

      - name: pytest
        run: python -m pytest -q
        working-directory: runtime
